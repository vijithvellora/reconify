<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Reconify{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .tab-active { @apply border-b-2 border-cyan-400 text-cyan-300; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">
  <nav class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center gap-6">
    <a href="/" class="text-cyan-400 font-bold text-lg tracking-widest">⚡ RECONIFY</a>
    <a href="/" class="text-gray-400 hover:text-white text-sm">Scans</a>
  </nav>
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
